services:
  postgres:
    image: postgres:17-alpine
    container_name: platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - platform-pg:/var/lib/postgresql/data

  # All-in-one Grafana + Prometheus + Loki + Tempo for local Grafana-integration
  # development. Image bundles the four services behind a single Grafana
  # frontend at :3000 with the three datasources pre-provisioned. Use the
  # admin/admin credentials, create a service account token, then point the
  # platform's Grafana connect dialog at http://localhost:3000.
  # Includes grafana-image-renderer in some tags but not all — verify on first
  # boot via `curl http://localhost:3000/api/plugins | jq '.[].id'` if the
  # connect dialog reports the renderer as unavailable.
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: platform-lgtm
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
      - "${PROMETHEUS_PORT:-9090}:9090"
      - "${LOKI_PORT:-3100}:3100"
      - "${TEMPO_PORT:-3200}:3200"
    volumes:
      - platform-lgtm:/data

  vikunja:
    image: vikunja/vikunja:latest
    container_name: platform-vikunja
    restart: unless-stopped
    user: "0:0"
    environment:
      VIKUNJA_SERVICE_PUBLICURL: "http://localhost:${VIKUNJA_PORT:-3456}"
      VIKUNJA_SERVICE_SECRET: "${VIKUNJA_JWT_SECRET:-vikunja-dev-jwt-secret}"
      VIKUNJA_SERVICE_FRONTENDURL: "http://localhost:${VIKUNJA_PORT:-3456}"
      VIKUNJA_SERVICE_ENABLECORS: "false"
      VIKUNJA_DATABASE_TYPE: sqlite
      VIKUNJA_SERVICE_ENABLEREGISTRATION: "true"
      VIKUNJA_AUTH_OPENID_ENABLED: "true"
      VIKUNJA_AUTH_OPENID_REDIRECTURL: "http://localhost:${VIKUNJA_PORT:-3456}/auth/openid/platform"
      VIKUNJA_AUTH_OPENID_PROVIDERS_PLATFORM_NAME: "Platform"
      VIKUNJA_AUTH_OPENID_PROVIDERS_PLATFORM_AUTHURL: "http://host.docker.internal:${API_PORT:-4000}"
      VIKUNJA_AUTH_OPENID_PROVIDERS_PLATFORM_CLIENTID: "${VIKUNJA_OIDC_CLIENT_ID:-platform-vikunja}"
      VIKUNJA_AUTH_OPENID_PROVIDERS_PLATFORM_CLIENTSECRET: "${VIKUNJA_OIDC_CLIENT_SECRET:-vikunja-dev-oidc-secret}"
      VIKUNJA_AUTH_OPENID_PROVIDERS_PLATFORM_SCOPE: "openid profile email"
      VIKUNJA_AUTH_OPENID_PROVIDERS_PLATFORM_USERNAMECLAIM: "preferred_username"
      VIKUNJA_RATELIMIT_ENABLED: "false"
    ports:
      - "${VIKUNJA_PORT:-3456}:3456"
    volumes:
      - platform-vikunja-db:/db
      - platform-vikunja-files:/app/vikunja/files

volumes:
  platform-pg:
  platform-lgtm:
  platform-vikunja-db:
  platform-vikunja-files:
